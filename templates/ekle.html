{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4>Yeni Hayvan Alış</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Küpe Numarası</label>
                        <input type="text" name="kupe_no" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Irkı (Simental, Angus vb.)</label>
                        <input type="text" name="irk" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Alış KG</label>
                        <input type="number" step="0.1" name="alis_kg" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Fiyat (₺)</label>
                        <input type="number" step="1" name="alis_fiyati" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sisteme Ekle</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
